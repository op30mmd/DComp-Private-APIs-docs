name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      run: |
        cmake -S DirectCompositionApp -B build -A x64

    - name: Build
      run: |
        cmake --build build --config Release

    - name: Run Tests
      run: |
        .\build\bin\Release\highlighter_test.exe
